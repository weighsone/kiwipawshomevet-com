<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60">
  <!-- Kiwi bird body -->
  <ellipse cx="28" cy="35" rx="18" ry="14" fill="white" fill-opacity="0.9"/>
  <!-- Kiwi head -->
  <circle cx="42" cy="25" r="9" fill="white" fill-opacity="0.9"/>
  <!-- Kiwi beak -->
  <path d="M49 24 Q62 22 63 25 Q62 28 49 26 Z" fill="#c4a87a"/>
  <!-- Kiwi eye -->
  <circle cx="47" cy="23" r="1.5" fill="#6b8c5a"/>
  <circle cx="47.5" cy="23" r="0.7" fill="#2c1a0e"/>
  <!-- Kiwi legs -->
  <line x1="22" y1="48" x2="20" y2="56" stroke="#c4a87a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="49" x2="32" y2="56" stroke="#c4a87a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Feet -->
  <path d="M18 56 L20 56 L22 54" stroke="#c4a87a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M30 56 L32 56 L34 54" stroke="#c4a87a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Paw print on body -->
  <circle cx="24" cy="35" r="3.5" fill="rgba(107,140,90,0.4)"/>
  <circle cx="20" cy="31" r="1.5" fill="rgba(107,140,90,0.4)"/>
  <circle cx="24" cy="30" r="1.5" fill="rgba(107,140,90,0.4)"/>
  <circle cx="28" cy="31" r="1.5" fill="rgba(107,140,90,0.4)"/>
  <!-- Text: Kiwi Paws -->
  <text x="72" y="26" font-family="Playfair Display, Georgia, serif" font-size="18" font-weight="700" fill="white">Kiwi Paws</text>
  <!-- Text: Home Vet -->
  <text x="72" y="45" font-family="Nunito, Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.75)">Home Vet</text>
</svg>
